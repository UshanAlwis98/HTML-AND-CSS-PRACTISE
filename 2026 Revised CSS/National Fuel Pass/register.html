<!doctype html>
<html lang="en">
  <head>
    <title>National Fuel Pass - Register</title>
    <link rel="stylesheet" href="CSS/register.css" />
  </head>
  <body>
    <header>
      <div class="main-header">
        <img
          src="img/Gov-Symbol.png"
          alt="National Fuel Pass Logo"
          class="logo"
        />

        <div class="language-btns">
          <button class="lang-btn-sinhala">සිංහල</button>
          <button class="lang-btn-tamil">தமிழ்</button>
          <button class="lang-btn-english">English</button>
        </div>
      </div>
    </header>

    <article class="Registration-form">
      <header>
        <h1>Registration</h1>

        <div class="login-link">
          <h3>Already have an account?</h3>
          <a href="login.html"> Login here</a>
        </div>

        <div class="tc">
          <a href="#">FAQs (Frequently Asked Questions)</a>
          <a href="#">Terms and Conditions</a>
          <a href="#">Privacy Notice</a>
        </div>
      </header>

      <main class="form-details">
        <h2>Personal Details</h2>
       
        <form action="#" method="post">

         

          <label for="NIC-label" class="label">NIC Number</label> 

          <div class="doc-type-and-doc-no">

          <input type="text" id="NIC-txt-box" name="NIC" class="txt-box" required />

          <select name="doc-type" class="doc-type">
            <option>NIC</option>
            <option>Passport</option>
            <option>BRN</option>
          </select>


          </div>



          </br>

          

          <div class="mobile-no-and-OTP">
          <label for="mobile-label" class="label label-mobile">Mobile Number</label>  
          <label for="OTP-label" class="label label-OTP">OTP</label>
          </div>


          <div class="mobile-no-and-OTP-txt-boxes">

          <div class="mobile-no"> 
          <input type="text"  name="mobile" class="txt-box mobile-txt-box" required />
          </div>


          <div class="OTP"> 
          <input type="text"  name="OTP" class="txt-box OTP-txt-box" required />
          </div>

          </div>

          </br>

          <button type="submit" class="send-otp-btn">Send OTP</button>
          <button type="submit" class="verify-btn">Verify</button>

          </br>

          <label for="first-name-label" class="label">First Name</label>
          <input
            type="text"
            id="first-name-txt-box"
            name="first-name"
            class="txt-box"
            required
          />

          <label for="last-name-label" class="label">Last Name</label>
          <input type="text" id="last-name-txt-box" name="last-name" class="txt-box" required />

          </br>
          <label for="Address" class="label">Address</label>
          <input type="text" id="Address-txt-box" name="Address" class="txt-box" required />
</br>
          <button type="submit" class="next-btn">Next</button>
        </form>
      </main>
    </article>

    <footer>
      <div class="footer-images">
        <img
          src="img/Gov-Symbol.png"
          alt="National Fuel Pass Logo"
          class="footer-logo-gov"
        />

        <img
          src="img/dialog.png"
          alt="Dialog Logo"
          class="footer-logo-dialog"
        />
        <img src="img/MIT_Symbol.png" alt="MIT Logo" class="footer-logo-MIT" />
      </div>
    </footer>
  </body>
</html>
