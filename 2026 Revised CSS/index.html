<!doctype html>
<html lang="en">
  <head>
    <title>2026 Revised CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>⛽ National Fuel Pass ⛽</h1>
      </header>

      <article>
        <div class="btns">
          <button class="reg-btn">Vehicle </br>Registration</button>
          <button class="login-btn">Vehicle </br> Login</button>
        </div>

        <div class="disclamier">
          <p>
            If your vehicle ownership or phone number has not changed, the QR
            code used previously will remain valid. If you do not currently have
            it, you can visit
            <a href="https://fuelpass.gov.lk/login" target="_blank">
              Fuelpass.gov.lk
            </a>
            and download the code that belongs to you.
          </p>
        </div>
      </article>
    </div>
  </body>
</html>
</br>
